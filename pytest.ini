[pytest]
testpaths = tests
markers =
    e2e: 真实端到端测试，需要 LLM_API_KEY 和 DEEPXIV_TOKEN（凭证缺失自动 skip）。
    browser: Playwright 浏览器 e2e（起 streamlit 子进程 + chromium，默认可跑；chromium 起不动则 skip）。
    sandbox_real: sandbox 真实执行 e2e（真建 venv / 真 pip install / 真 subprocess / 真收产物；不需凭证、不耗 deepxiv/LLM 配额，但慢）。这些用例同时打 e2e 标签以便被 `-m "not e2e"` 快速回归排除；显式 `-m sandbox_real` 触发真跑。
