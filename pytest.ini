[pytest]
testpaths = tests
; 默认排除 e2e（防误跑真实链路耗 LLM/deepxiv 配额，2026-07-04 E4 事故机制性防线）。
; 跑 e2e 须显式 `-m e2e` 覆盖（命令行 -m 优先于 addopts），且须 Maria 明确授权。
addopts = -m "not e2e"
markers =
    e2e: 真实端到端测试，需要 LLM_API_KEY 和 DEEPXIV_TOKEN（凭证缺失自动 skip）。默认被 addopts 排除，显式 `-m e2e` 才跑。
    browser: Playwright 浏览器 e2e（起 streamlit 子进程 + chromium，默认可跑；chromium 起不动则 skip）。
    sandbox_real: sandbox 真实执行 e2e（真建 venv / 真 pip install / 真 subprocess / 真收产物；不需凭证、不耗 deepxiv/LLM 配额，但慢）。这些用例同时打 e2e 标签，随 addopts 默认排除；显式 `-m sandbox_real` 触发真跑。
